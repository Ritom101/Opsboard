name: ACR Login Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  acr-test:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name opsboardacr2026

      - name: Verify ACR Access
        run: az acr repository list --name opsboardacr2026 --output table